name: Main

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  version:
    if: ${{ !contains(github.event.head_commit.message, '[skip version]') }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Apply pending version changes
        run: go run ./infra/versioning/cmd/versionbump -commit "$GITHUB_SHA"

      - name: Commit version manifest
        run: |
          if git diff --quiet -- infra/versioning/version.json changes; then
            echo "No version changes to commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add infra/versioning/version.json changes
          git commit -m "chore: update version manifest [skip version]"
          git push
